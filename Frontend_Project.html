<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Registration System</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #dcdcdc, #f5f5f5);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
      color: #333;
    }

    .container {
      width: 95%;
      max-width: 950px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 40px 50px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      text-align: center;
      font-size: 2.2em;
      margin-bottom: 25px;
      letter-spacing: 0.5px;
      color: #222;
    }

    form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    label {
      font-weight: 500;
      font-size: 20px;
      margin-bottom: 5px;
      display: block;
      color: #333;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #fafafa;
      color: #333;
      outline: none;
      transition: 0.3s;
      resize: none;
    }

    input::placeholder, textarea::placeholder {
      color: #888;
    }

    input:focus, select:focus, textarea:focus {
      background: #fff;
      border-color: #666;
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
    }

    select {
      color: #333;
      background-color: #fafafa;
    }

    select option {
      color: #333;
      background: #fff;
    }

    .full-width {
      grid-column: span 2;
    }

    button {
      grid-column: span 2;
      background: linear-gradient(135deg, #b4b4b4, #d8d8d8);
      border: none;
      color: #222;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 1px;
      transition: 0.3s;
    }

    button:hover {
      background: linear-gradient(135deg, #a8a8a8, #cfcfcf);
      transform: scale(1.03);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 40px;
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      text-align: center;
      font-size:15px;
    }

    th {
      background: #c0c0c0;
      color: #222;
      font-weight: 600;
    }

    td {
      background: #f9f9f9;
      color: #333;
    }

    tr:nth-child(even) td {
      background: #efefef;
    }

    .error {
      color: #c0392b;
      font-size: 13px;
      margin-top: -8px;
    }

    @media (max-width: 700px) {
      form {
        grid-template-columns: 1fr;
      }
      .full-width {
        grid-column: span 1;
      }
    }
  </style>   
</head>
<body>
  <div class="container">
    <h1>Student Registration System</h1>

    <form id="studentForm">
      <div>
        <label>Roll Number</label>
        <input type="text" id="roll" placeholder="Enter roll number">
        <div class="error" id="rollError"></div>
      </div>

      <div>
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter full name">
        <div class="error" id="nameError"></div>
      </div>

      <div>
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter email address">
        <div class="error" id="emailError"></div>
      </div>

      <div>
        <label>Phone</label>
        <input type="text" id="phone" placeholder="Enter phone number">
        <div class="error" id="phoneError"></div>
      </div>

      <div>
        <label>Date of Birth</label>
        <input type="date" id="dob">
        <div class="error" id="dobError"></div>
      </div>

      <div>
        <label>Gender</label>
        <select id="gender">
          <option value="">Select</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
        <div class="error" id="genderError"></div>
      </div>

      <div class="full-width">
        <label>Address</label>
        <textarea id="address" rows="2" placeholder="Enter address"></textarea>
        <div class="error" id="addressError"></div>
      </div>

      <div>
        <label>Course</label>
        <select id="course">
          <option value="">Select Course</option>
          <option>BCA</option>
          <option>MCA</option>
          <option>B.Tech</option>
          <option>M.Tech</option>
          <option>B.Sc</option>
          <option>M.Sc</option>
        </select>
        <div class="error" id="courseError"></div>
      </div>

      <div>
        <label>Year</label>
        <select id="year">
          <option value="">Select Year</option>
          <option>1st Year</option>
          <option>2nd Year</option>
          <option>3rd Year</option>
          <option>4th Year</option>
        </select>
        <div class="error" id="yearError"></div>
      </div>

      <button type="submit">Register Student</button>
    </form>

    <table id="studentTable">
      <thead>
        <tr>
          <th>Roll No</th>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>DOB</th>
          <th>Gender</th>
          <th>Course</th>
          <th>Year</th>
          <th>Address</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    const form = document.getElementById("studentForm");
    const tableBody = document.querySelector("#studentTable tbody");

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const roll = document.getElementById("roll").value.trim();
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const dob = document.getElementById("dob").value;
      const gender = document.getElementById("gender").value;
      const address = document.getElementById("address").value.trim();
      const course = document.getElementById("course").value;
      const year = document.getElementById("year").value;

      let valid = true;
      document.querySelectorAll(".error").forEach(el => el.textContent = "");

      if (!roll) { document.getElementById("rollError").textContent = "Enter roll number"; valid = false; }
      if (!name) { document.getElementById("nameError").textContent = "Enter full name"; valid = false; }
      if (!email || !/^[^@]+@[^@]+\.[^@]+$/.test(email)) {
        document.getElementById("emailError").textContent = "Enter valid email"; valid = false;
      }
      if (!phone || !/^[0-9]{10}$/.test(phone)) {
        document.getElementById("phoneError").textContent = "Enter valid 10-digit number"; valid = false;
      }
      if (!dob) { document.getElementById("dobError").textContent = "Select DOB"; valid = false; }
      if (!gender) { document.getElementById("genderError").textContent = "Select gender"; valid = false; }
      if (!address) { document.getElementById("addressError").textContent = "Enter address"; valid = false; }
      if (!course) { document.getElementById("courseError").textContent = "Select course"; valid = false; }
      if (!year) { document.getElementById("yearError").textContent = "Select year"; valid = false; }

      if (!valid) return;

      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${roll}</td>
        <td>${name}</td>
        <td>${email}</td>
        <td>${phone}</td>
        <td>${dob}</td>
        <td>${gender}</td>
        <td>${course}</td>
        <td>${year}</td>
        <td>${address}</td>
      `;
      tableBody.appendChild(row);
      form.reset();
    });
  </script>
</body>
</html>
